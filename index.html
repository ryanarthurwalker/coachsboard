<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Basketball Coach Board</title>
  <style>
    :root {
      --page: #ffffff;
      --text: #111827;
      --red: #cf2f3f;
      --blue: #2454c8;
      --glass: rgba(255, 255, 255, 0.22);
      --glass-strong: rgba(255, 255, 255, 0.34);
      --glass-border: rgba(17, 24, 39, 0.14);
      --shadow: 0 18px 36px rgba(15, 23, 42, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow: hidden;
      background: var(--page);
      color: var(--text);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
    }

    body {
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .app {
      position: relative;
      width: 100vw;
      width: 100dvw;
      height: 100vh;
      height: 100dvh;
      background: #ffffff;
    }

    .board-shell {
      position: relative;
      width: 100%;
      height: 100%;
      padding:
        max(16px, env(safe-area-inset-top))
        max(16px, env(safe-area-inset-right))
        max(16px, env(safe-area-inset-bottom))
        max(16px, env(safe-area-inset-left));
      display: flex;
      align-items: center;
      justify-content: center;
      --board-left: 0px;
      --board-top: 0px;
      --board-width: 0px;
      --board-height: 0px;
    }

    canvas {
      display: block;
      border-radius: 28px;
      background: #ffffff;
      border: 1px solid rgba(148, 163, 184, 0.22);
      box-shadow: var(--shadow);
      touch-action: none;
    }

    .control-rail {
      position: absolute;
      z-index: 2;
      display: flex;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      background: var(--glass);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
    }

    .board-shell[data-rotated="false"] .control-rail {
      flex-direction: column;
    }

    .board-shell[data-rotated="true"] .control-rail {
      flex-direction: row;
    }

    .control-rail--ink {
      left: calc(var(--board-left) + 16px);
      top: calc(var(--board-top) + (var(--board-height) / 2));
      transform: translateY(-50%);
    }

    .control-rail--actions {
      left: calc(var(--board-left) + var(--board-width) - 16px);
      top: calc(var(--board-top) + (var(--board-height) / 2));
      transform: translate(-100%, -50%);
    }

    .board-shell[data-rotated="true"] .control-rail--ink {
      left: calc(var(--board-left) + (var(--board-width) / 2));
      top: calc(var(--board-top) + 16px);
      transform: translateX(-50%);
    }

    .board-shell[data-rotated="true"] .control-rail--actions {
      left: calc(var(--board-left) + (var(--board-width) / 2));
      top: calc(var(--board-top) + var(--board-height) - 16px);
      transform: translate(-50%, -100%);
    }

    button {
      appearance: none;
      border: 1px solid rgba(17, 24, 39, 0.12);
      border-radius: 999px;
      background: var(--glass-strong);
      color: var(--text);
      cursor: pointer;
      font: inherit;
      font-size: 0.92rem;
      min-width: clamp(46px, 8vw, 58px);
      min-height: clamp(46px, 8vw, 58px);
      padding: 10px 14px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.46);
      border-color: rgba(17, 24, 39, 0.18);
    }

    button:disabled {
      opacity: 0.38;
      cursor: default;
    }

    .color-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: clamp(58px, 10vw, 72px);
    }

    .color-btn.active {
      border-color: rgba(17, 24, 39, 0.24);
      background: rgba(255, 255, 255, 0.54);
    }

    .swatch {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid rgba(0, 0, 0, 0.12);
    }

    .swatch--red {
      background: var(--red);
    }

    .swatch--blue {
      background: var(--blue);
    }

    @media (max-width: 720px) {
      .control-rail {
        gap: 8px;
        padding: 8px;
      }

      button {
        font-size: 0.82rem;
        padding: 8px 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="board-shell" id="boardShell" data-rotated="false">
      <div class="control-rail control-rail--ink" aria-label="Ink controls">
        <button type="button" class="color-btn active" data-color="red" aria-label="Use red ink" aria-pressed="true">
          <span class="swatch swatch--red" aria-hidden="true"></span>
          <span>Red</span>
        </button>
        <button type="button" class="color-btn" data-color="blue" aria-label="Use blue ink" aria-pressed="false">
          <span class="swatch swatch--blue" aria-hidden="true"></span>
          <span>Blue</span>
        </button>
      </div>

      <canvas id="board" aria-label="Basketball whiteboard"></canvas>

      <div class="control-rail control-rail--actions" aria-label="Board actions">
        <button type="button" id="undoBtn">Undo</button>
        <button type="button" id="redoBtn">Redo</button>
        <button type="button" id="clearBtn">Clear</button>
        <button type="button" id="fullscreenBtn" aria-pressed="false">Full</button>
      </div>
    </div>
  </div>

  <script>
    const app = document.getElementById("app");
    const boardShell = document.getElementById("boardShell");
    const canvas = document.getElementById("board");
    const ctx = canvas.getContext("2d");
    const colorButtons = [...document.querySelectorAll("[data-color]")];
    const undoBtn = document.getElementById("undoBtn");
    const redoBtn = document.getElementById("redoBtn");
    const clearBtn = document.getElementById("clearBtn");
    const fullscreenBtn = document.getElementById("fullscreenBtn");

    const ink = {
      red: "#cf2f3f",
      blue: "#2454c8"
    };

    const courtImage = new Image();
    courtImage.src = "./basketball-court-diagram.png";

    let activeColor = "red";
    let history = [];
    let redoStack = [];
    let activeStroke = null;
    let activePointerId = null;

    const layout = {
      rotated: false,
      scale: 1,
      offsetX: 0,
      offsetY: 0,
      tx: 0,
      ty: 0,
      surfaceWidth: 0,
      surfaceHeight: 0
    };

    function isLandscape() {
      return window.matchMedia("(orientation: landscape)").matches;
    }

    function pointInsideCourt(point) {
      return point.x >= 0 && point.x <= courtImage.naturalWidth &&
        point.y >= 0 && point.y <= courtImage.naturalHeight;
    }

    function eventToCourtPoint(event) {
      const rect = canvas.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      const pressure = event.pressure && event.pressure > 0 ? event.pressure : 0.5;

      if (layout.rotated) {
        const localX = x - layout.tx;
        const localY = y - layout.ty;
        return {
          x: localY / layout.scale,
          y: -localX / layout.scale,
          pressure
        };
      }

      return {
        x: (x - layout.offsetX) / layout.scale,
        y: (y - layout.offsetY) / layout.scale,
        pressure
      };
    }

    function drawStroke(stroke) {
      if (!stroke.points.length) {
        return;
      }

      ctx.strokeStyle = stroke.color;
      ctx.fillStyle = stroke.color;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      if (stroke.points.length === 1) {
        ctx.beginPath();
        ctx.arc(stroke.points[0].x, stroke.points[0].y, 10, 0, Math.PI * 2);
        ctx.fill();
        return;
      }

      for (let index = 1; index < stroke.points.length; index += 1) {
        const previous = stroke.points[index - 1];
        const current = stroke.points[index];
        ctx.lineWidth = 18 + current.pressure * 18;
        ctx.beginPath();
        ctx.moveTo(previous.x, previous.y);
        ctx.lineTo(current.x, current.y);
        ctx.stroke();
      }
    }

    function applyCourtTransform() {
      if (layout.rotated) {
        ctx.translate(layout.tx, layout.ty);
        ctx.rotate(Math.PI / 2);
        ctx.scale(layout.scale, layout.scale);
        return;
      }

      ctx.translate(layout.offsetX, layout.offsetY);
      ctx.scale(layout.scale, layout.scale);
    }

    function syncButtons() {
      undoBtn.disabled = history.length === 0;
      redoBtn.disabled = redoStack.length === 0;
      const isFullscreen = Boolean(document.fullscreenElement);
      fullscreenBtn.textContent = isFullscreen ? "Exit" : "Full";
      fullscreenBtn.setAttribute("aria-pressed", String(isFullscreen));
    }

    function render() {
      syncButtons();

      ctx.clearRect(0, 0, layout.surfaceWidth, layout.surfaceHeight);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, layout.surfaceWidth, layout.surfaceHeight);

      if (!courtImage.complete || !courtImage.naturalWidth || !courtImage.naturalHeight) {
        ctx.fillStyle = "#111827";
        ctx.font = "600 18px Avenir Next, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("Loading court diagram...", layout.surfaceWidth / 2, layout.surfaceHeight / 2);
        return;
      }

      ctx.save();
      applyCourtTransform();
      ctx.drawImage(courtImage, 0, 0, courtImage.naturalWidth, courtImage.naturalHeight);
      history.forEach(drawStroke);

      if (activeStroke) {
        drawStroke(activeStroke);
      }

      ctx.restore();
    }

    function updateLayout() {
      if (!courtImage.naturalWidth || !courtImage.naturalHeight) {
        return;
      }

      const shellRect = boardShell.getBoundingClientRect();
      const rotated = isLandscape();
      const displayAspect = rotated
        ? courtImage.naturalHeight / courtImage.naturalWidth
        : courtImage.naturalWidth / courtImage.naturalHeight;

      let width = shellRect.width;
      let height = width / displayAspect;

      if (height > shellRect.height) {
        height = shellRect.height;
        width = height * displayAspect;
      }

      const boardLeft = (shellRect.width - width) / 2;
      const boardTop = (shellRect.height - height) / 2;

      layout.rotated = rotated;
      layout.surfaceWidth = width;
      layout.surfaceHeight = height;
      layout.scale = rotated
        ? Math.min(width / courtImage.naturalHeight, height / courtImage.naturalWidth)
        : Math.min(width / courtImage.naturalWidth, height / courtImage.naturalHeight);
      layout.offsetX = rotated
        ? (width - courtImage.naturalHeight * layout.scale) / 2
        : (width - courtImage.naturalWidth * layout.scale) / 2;
      layout.offsetY = rotated
        ? (height - courtImage.naturalWidth * layout.scale) / 2
        : (height - courtImage.naturalHeight * layout.scale) / 2;
      layout.tx = layout.offsetX + courtImage.naturalHeight * layout.scale;
      layout.ty = layout.offsetY;

      boardShell.dataset.rotated = String(rotated);
      boardShell.style.setProperty("--board-left", `${boardLeft}px`);
      boardShell.style.setProperty("--board-top", `${boardTop}px`);
      boardShell.style.setProperty("--board-width", `${width}px`);
      boardShell.style.setProperty("--board-height", `${height}px`);

      canvas.style.width = `${width}px`;
      canvas.style.height = `${height}px`;

      const ratio = window.devicePixelRatio || 1;
      canvas.width = Math.round(width * ratio);
      canvas.height = Math.round(height * ratio);
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

      render();
    }

    function setColor(colorName) {
      activeColor = colorName;
      colorButtons.forEach((button) => {
        const isActive = button.dataset.color === colorName;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-pressed", String(isActive));
      });
    }

    function startStroke(event) {
      if (activePointerId !== null || !courtImage.naturalWidth) {
        return;
      }

      const point = eventToCourtPoint(event);

      if (!pointInsideCourt(point)) {
        return;
      }

      activePointerId = event.pointerId;
      canvas.setPointerCapture(event.pointerId);
      activeStroke = {
        color: ink[activeColor],
        points: [point]
      };
      redoStack = [];
      render();
    }

    function moveStroke(event) {
      if (event.pointerId !== activePointerId || !activeStroke) {
        return;
      }

      const point = eventToCourtPoint(event);
      activeStroke.points.push({
        x: Math.max(0, Math.min(courtImage.naturalWidth, point.x)),
        y: Math.max(0, Math.min(courtImage.naturalHeight, point.y)),
        pressure: point.pressure
      });
      render();
    }

    function endStroke(event) {
      if (event.pointerId !== activePointerId || !activeStroke) {
        return;
      }

      moveStroke(event);
      history.push(activeStroke);
      activeStroke = null;
      activePointerId = null;
      render();
    }

    async function toggleFullscreen() {
      try {
        if (!document.fullscreenElement) {
          if (app.requestFullscreen) {
            await app.requestFullscreen();
          }
        } else if (document.exitFullscreen) {
          await document.exitFullscreen();
        }
      } catch (error) {
        console.error("Fullscreen request failed.", error);
      }
    }

    canvas.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      startStroke(event);
    });

    canvas.addEventListener("pointermove", (event) => {
      event.preventDefault();
      moveStroke(event);
    });

    canvas.addEventListener("pointerup", endStroke);
    canvas.addEventListener("pointercancel", endStroke);

    colorButtons.forEach((button) => {
      button.addEventListener("click", () => setColor(button.dataset.color));
    });

    undoBtn.addEventListener("click", () => {
      if (!history.length) {
        return;
      }

      redoStack.push(history.pop());
      render();
    });

    redoBtn.addEventListener("click", () => {
      if (!redoStack.length) {
        return;
      }

      history.push(redoStack.pop());
      render();
    });

    clearBtn.addEventListener("click", () => {
      history = [];
      redoStack = [];
      activeStroke = null;
      activePointerId = null;
      render();
    });

    fullscreenBtn.addEventListener("click", toggleFullscreen);
    document.addEventListener("fullscreenchange", () => {
      syncButtons();
      updateLayout();
    });

    window.addEventListener("resize", updateLayout);
    window.addEventListener("orientationchange", updateLayout);
    window.visualViewport?.addEventListener("resize", updateLayout);

    if ("ResizeObserver" in window) {
      const resizeObserver = new ResizeObserver(updateLayout);
      resizeObserver.observe(boardShell);
    }

    courtImage.addEventListener("load", updateLayout);
    courtImage.addEventListener("error", () => {
      ctx.fillStyle = "#111827";
      ctx.font = "600 18px Avenir Next, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("Could not load the court diagram image.", layout.surfaceWidth / 2, layout.surfaceHeight / 2);
    });

    setColor(activeColor);
    syncButtons();
    render();

    if (courtImage.complete) {
      updateLayout();
    }
  </script>
</body>
</html>
